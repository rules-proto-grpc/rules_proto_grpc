[package]
name = "rules-proto-grpc-rust-crates"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
path = "cargo_stub.rs"

[dependencies]
async-stream = "0.3.6"
futures = "0.3.31"
pbjson = "0.8.0"
pbjson-types = "0.8.0"
prost = "0.14.1"
prost-derive = "0.14.1"
prost-types = "0.14.1"
proto-types = { version = "0.2.2", features = ["all_common", "rpc", "serde"] }
protoc-gen-prost = "0.5.0"
protoc-gen-prost-crate = "0.5.0"
protoc-gen-prost-serde = "0.4.0"
protoc-gen-tonic = "0.5.0"
rand = "0.8.5"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tokio = { version = "1.48.0", features = ["macros", "rt", "sync", "time"] }
tokio-stream = "0.1.17"
tonic = "0.14.1"
tonic-prost = "0.14.1"
